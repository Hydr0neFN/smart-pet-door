[env:esp32-c6-devkitm-1]
; Official espressif32 ships arduino-esp32 v2.x (no C6). pioarduino fork = v3.x.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino
lib_deps =
	teemuatlut/TMCStepper@^0.7.3
	gin66/FastAccelStepper@^1.2.5
	adafruit/Adafruit VL53L1X@^3.1.2

; C6 console is USB-Serial-JTAG (HWCDC) → Serial over USB so monitor works and
; both hardware UARTs (0,1) stay free for the two radars.
; USB_MODE=1 picks the HWCDC path (C6 has no USB-OTG, so the TinyUSB/USBSerial
; path is invalid); CDC_ON_BOOT=1 makes `Serial` = the USB-JTAG console.
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = 115200
