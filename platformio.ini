; PlatformIO Project Configuration — Smart Pet Door (ESP32-C6 DevKitM-1)
; ---------------------------------------------------------------------------
; The ESP32-C6 carries two independent radios: 2.4 GHz Wi-Fi and an 802.15.4
; radio (Zigbee). On this board mmWave 1 occupies UART0 (GPIO16/17) — the same
; pins as the CH340 USB-serial console — and the native USB-Serial-JTAG pins
; (GPIO12/13) are reused for MISO / END_STOP1. So with the radars wired, the
; only live debug-log path is Wi-Fi telnet.
;
; Pick ONE radio profile per build via the env (sets the RADIO_MODE flag):
;   debug-wifi    RADIO_MODE=0  Wi-Fi telnet logging, Zigbee OFF      (bring-up)
;   deploy-zigbee RADIO_MODE=1  Zigbee end device, logs over USB only (shipping)
;   debug-both    RADIO_MODE=2  Wi-Fi telnet + Zigbee coexistence     (heavy)
; ---------------------------------------------------------------------------

[platformio]
default_envs = debug-wifi

[env]
; Official espressif32 ships arduino-esp32 v2.x (no C6). pioarduino fork = v3.x.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
	teemuatlut/TMCStepper@^0.7.3
	gin66/FastAccelStepper@^1.2.5
	adafruit/Adafruit VL53L1X@^3.1.2
; CDC_ON_BOOT=0 keeps `Serial` = HardwareSerial UART0. Note: UART0 is shared with
; mmWave 1 — Serial logging is only meaningful when the inside radar is disabled.
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=0

; ── Debug: Wi-Fi telnet logging, Zigbee OFF ─────────────────────────────────
[env:debug-wifi]
; The bundled Zigbee core lib links zboss only when ZIGBEE_MODE_ED is set; ignore
; it here so it is not compiled/linked into the non-Zigbee build.
lib_ignore = Zigbee
build_flags =
	${env.build_flags}
	-DRADIO_MODE=0

; ── Deploy: Zigbee end device (no Wi-Fi); logs over USB serial only ──────────
[env:deploy-zigbee]
board_build.zigbee_mode = ed
board_build.partitions = partitions_zigbee.csv
build_flags =
	${env.build_flags}
	-DZIGBEE_MODE_ED
	-DRADIO_MODE=1

; ── Coexistence: Wi-Fi telnet + Zigbee (RF coex, higher RAM; bring-up only) ──
[env:debug-both]
board_build.zigbee_mode = ed
board_build.partitions = partitions_zigbee.csv
build_flags =
	${env.build_flags}
	-DZIGBEE_MODE_ED
	-DRADIO_MODE=2
